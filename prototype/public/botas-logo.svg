<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <linearGradient id="boot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF79AC"/>
      <stop offset="100%" style="stop-color:#D4457A"/>
    </linearGradient>
    <linearGradient id="fur" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0EB"/>
      <stop offset="100%" style="stop-color:#E8E0D8"/>
    </linearGradient>
  </defs>

  <!-- Cat leg (cream/white fur) going into the boot -->
  <rect x="38" y="0" width="44" height="58" rx="22" fill="url(#fur)" stroke="#C4B8AC" stroke-width="2"/>

  <!-- Small fur tufts visible just at the boot opening -->
  <ellipse cx="45" cy="56" rx="4" ry="3" fill="url(#fur)" stroke="#C4B8AC" stroke-width="1"/>
  <ellipse cx="60" cy="55" rx="4" ry="3" fill="url(#fur)" stroke="#C4B8AC" stroke-width="1"/>
  <ellipse cx="75" cy="56" rx="4" ry="3" fill="url(#fur)" stroke="#C4B8AC" stroke-width="1"/>

  <!-- Boot cuff (fluffy top edge) covers the paw -->
  <ellipse cx="60" cy="60" rx="30" ry="7" fill="#FFE0EB" stroke="#E8A0B8" stroke-width="1"/>
  <ellipse cx="48" cy="59" rx="5" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="72" cy="59" rx="5" ry="4" fill="white" opacity="0.5"/>

  <!-- Boot shaft -->
  <path d="M32 58 L32 100 Q32 104 36 104 L84 104 Q88 104 88 100 L88 58 Z" fill="url(#boot)" stroke="#C4507A" stroke-width="1.5"/>

  <!-- Boot foot -->
  <path d="M28 100 L88 100 L97 108 Q100 114 96 120 L92 124 Q88 127 82 127 L22 127 Q16 127 14 122 L13 118 Q12 114 16 110 Z" fill="url(#boot)" stroke="#C4507A" stroke-width="1.5"/>


  <!-- Boot strap -->
  <rect x="34" y="78" width="52" height="5" rx="2.5" fill="#E8608A" stroke="#C4507A" stroke-width="0.5"/>
  <!-- Golden buckle -->
  <rect x="53" y="74" width="14" height="14" rx="3" fill="none" stroke="#F0C040" stroke-width="2.5"/>
  <rect x="59" y="78" width="3" height="5" rx="1" fill="#F0C040"/>

  <!-- Boot shine highlights -->
  <ellipse cx="46" cy="72" rx="5" ry="14" fill="white" opacity="0.15" transform="rotate(-3 46 72)"/>
  <ellipse cx="42" cy="112" rx="4" ry="7" fill="white" opacity="0.12" transform="rotate(15 42 112)"/>

  <!-- Toe crease line -->
  <path d="M52 113 Q58 109 64 113" stroke="#C4507A" stroke-width="1.2" fill="none" opacity="0.3"/>

  <!-- Sparkles -->
  <g transform="translate(102, 55)" fill="#F0C040" opacity="0.9">
    <path d="M0,-5 L1.5,-1.5 L5,0 L1.5,1.5 L0,5 L-1.5,1.5 L-5,0 L-1.5,-1.5 Z" transform="scale(0.7)"/>
  </g>
  <g transform="translate(108, 68)" fill="#F0C040" opacity="0.5">
    <path d="M0,-3 L1,-1 L3,0 L1,1 L0,3 L-1,1 L-3,0 L-1,-1 Z" transform="scale(0.5)"/>
  </g>
  <g transform="translate(14, 40)" fill="#F0C040" opacity="0.6">
    <path d="M0,-4 L1.2,-1.2 L4,0 L1.2,1.2 L0,4 L-1.2,1.2 L-4,0 L-1.2,-1.2 Z" transform="scale(0.5)"/>
  </g>
</svg>
