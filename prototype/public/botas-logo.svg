<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Boot shape -->
  <defs>
    <linearGradient id="bootGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF79AC"/>
      <stop offset="100%" style="stop-color:#D4457A"/>
    </linearGradient>
    <linearGradient id="soleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#121118"/>
      <stop offset="100%" style="stop-color:#2a2a35"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#121118"/>
  <!-- Boot body -->
  <path d="M42 30 C42 26, 58 26, 58 30 L58 65 L85 65 C90 65, 92 70, 92 75 L92 82 C92 87, 88 90, 83 90 L35 90 C30 90, 28 87, 28 82 L28 78 C28 73, 32 70, 38 70 L42 70 Z" fill="url(#bootGrad)"/>
  <!-- Boot sole -->
  <rect x="26" y="86" width="68" height="8" rx="4" fill="url(#soleGrad)"/>
  <!-- Boot top cuff -->
  <rect x="40" y="28" width="20" height="6" rx="3" fill="#FFB3D0" opacity="0.6"/>
  <!-- Shine highlight -->
  <ellipse cx="48" cy="50" rx="4" ry="12" fill="white" opacity="0.15" transform="rotate(-5 48 50)"/>
  <!-- Lace dots -->
  <circle cx="50" cy="38" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="50" cy="44" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="50" cy="50" r="1.5" fill="white" opacity="0.7"/>
  <!-- Star sparkle -->
  <g transform="translate(75, 40)" fill="#FFD700" opacity="0.8">
    <path d="M0,-5 L1.5,-1.5 L5,0 L1.5,1.5 L0,5 L-1.5,1.5 L-5,0 L-1.5,-1.5 Z" transform="scale(0.8)"/>
  </g>
  <g transform="translate(82, 50)" fill="#FFD700" opacity="0.5">
    <path d="M0,-3 L1,-1 L3,0 L1,1 L0,3 L-1,1 L-3,0 L-1,-1 Z" transform="scale(0.6)"/>
  </g>
</svg>
