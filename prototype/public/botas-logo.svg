<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <linearGradient id="boot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF79AC"/>
      <stop offset="100%" style="stop-color:#D4457A"/>
    </linearGradient>
  </defs>

  <!-- Cat leg (white fur) coming from top -->
  <rect x="38" y="0" width="44" height="65" rx="22" fill="white"/>
  <!-- Fur texture lines -->
  <path d="M45 10 Q48 15 45 20" stroke="#eee" stroke-width="1" fill="none"/>
  <path d="M75 12 Q72 17 75 22" stroke="#eee" stroke-width="1" fill="none"/>
  <path d="M50 25 Q53 30 50 35" stroke="#eee" stroke-width="1" fill="none"/>

  <!-- Boot cuff (top of boot, where fur meets leather) -->
  <ellipse cx="60" cy="58" rx="28" ry="8" fill="#FFB3D0"/>
  <ellipse cx="60" cy="56" rx="26" ry="6" fill="url(#boot)"/>

  <!-- Boot shaft -->
  <path d="M34 56 L34 100 Q34 105 39 105 L81 105 Q86 105 86 100 L86 56 Z" fill="url(#boot)"/>

  <!-- Boot foot (wider, goes forward) -->
  <path d="M30 100 L86 100 L95 108 Q98 115 94 120 L90 125 Q86 128 80 128 L25 128 Q18 128 16 122 L15 118 Q14 114 18 110 Z" fill="url(#boot)"/>

  <!-- Boot sole -->
  <path d="M15 125 Q14 130 18 133 L80 133 Q90 133 94 128 L94 125 Z" fill="#121118"/>
  <!-- Heel -->
  <rect x="14" y="125" width="14" height="10" rx="3" fill="#121118"/>

  <!-- Boot strap/buckle -->
  <rect x="36" y="78" width="48" height="5" rx="2.5" fill="#FFB3D0" opacity="0.9"/>
  <!-- Buckle -->
  <rect x="54" y="74" width="12" height="13" rx="3" fill="none" stroke="#FFD700" stroke-width="2.5"/>
  <rect x="59" y="78" width="2" height="5" rx="1" fill="#FFD700"/>

  <!-- Boot shine -->
  <ellipse cx="48" cy="72" rx="5" ry="15" fill="white" opacity="0.12" transform="rotate(-3 48 72)"/>
  <ellipse cx="45" cy="110" rx="4" ry="8" fill="white" opacity="0.1" transform="rotate(15 45 110)"/>

  <!-- Toe crease -->
  <path d="M55 112 Q60 108 65 112" stroke="#D4457A" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Cat toes peeking out slightly at the top (fur puffs) -->
  <ellipse cx="45" cy="48" rx="6" ry="4" fill="white" opacity="0.6"/>
  <ellipse cx="60" cy="46" rx="6" ry="4" fill="white" opacity="0.6"/>
  <ellipse cx="75" cy="48" rx="6" ry="4" fill="white" opacity="0.6"/>

  <!-- Sparkle -->
  <g transform="translate(100, 65)" fill="#FFD700" opacity="0.8">
    <path d="M0,-6 L2,-2 L6,0 L2,2 L0,6 L-2,2 L-6,0 L-2,-2 Z" transform="scale(0.6)"/>
  </g>
</svg>
